<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - Moje Portfólio</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Moje Portfólio</div>
            <ul class="nav-links">
                <li><a href="../index.html">Domov</a></li>
                <li><a href="about.html">O mne</a></li>
                <li><a href="projects.html">Projekty</a></li>
                <li><a href="gallery.html">Galéria</a></li>
                <li><a href="contact.html" class="active">Kontakt</a></li>
                <li><a href="data.html">Dáta</a></li>
            </ul>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1>Kontaktuj ma</h1>
            <p>Vyplň formulár a ja ti odpoviem čo najskôr</p>
        </div>
    </header>

    <section class="content">
        <div class="container">
            <div class="form-section">
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Meno *</label>
                        <input type="text" id="name" name="name" placeholder="Tvoje meno" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" placeholder="tvoj@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Telefón</label>
                        <input type="text" id="phone" name="phone" placeholder="+421 xxx xxx xxx">
                    </div>

                    <div class="form-group">
                        <label for="subject">Predmet *</label>
                        <select id="subject" name="subject" required>
                            <option value="">-- Vyber predmet --</option>
                            <option value="project">Nový projekt</option>
                            <option value="consultation">Konzultácia</option>
                            <option value="collaboration">Spolupráca</option>
                            <option value="feedback">Spätná väzba</option>
                            <option value="other">Iné</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Správa *</label>
                        <textarea id="message" name="message" rows="5" placeholder="Tvoja správa..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="file">Príloha (PDF, DOC, DOCX, TXT)</label>
                        <input type="file" id="file" name="file">
                    </div>

                    <div class="form-group">
                        <label>Ako si o mne dozvedel? *</label>
                        <div class="radio-group">
                            <label>
                                <input type="radio" name="source" value="search" required> Vyhľadávanie
                            </label>
                            <label>
                                <input type="radio" name="source" value="social"> Sociálne siete
                            </label>
                            <label>
                                <input type="radio" name="source" value="referral"> Odporúčanie
                            </label>
                            <label>
                                <input type="radio" name="source" value="other"> Iné
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="checkbox-group">
                            <label>
                                <input type="checkbox" name="terms" required>
                                Súhlasím s podmienkami spracovania dát *
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer;">Odoslať</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Moje Portfólio. Všetky práva vyhradené.</p>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
